name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write  # needed for creating releases

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 python-docx kenlm jieba pypinyin loguru
          pip install torch transformers --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm `
            --name="DocProof" `
            --windowed `
            --onedir `
            --add-data="third_party/pycorrector/pycorrector;pycorrector" `
            --add-data="models;models" `
            --hidden-import="pycorrector" `
            --hidden-import="pycorrector.macbert" `
            --hidden-import="pycorrector.macbert.macbert_corrector" `
            --hidden-import="pycorrector.corrector" `
            --hidden-import="pycorrector.detector" `
            --hidden-import="pycorrector.proper_corrector" `
            --hidden-import="pycorrector.utils" `
            --hidden-import="pycorrector.utils.text_utils" `
            --hidden-import="pycorrector.utils.tokenizer" `
            --hidden-import="pycorrector.utils.get_file" `
            --hidden-import="pycorrector.utils.error_utils" `
            --hidden-import="pycorrector.utils.tokenizer" `
            --hidden-import="kenlm" `
            --hidden-import="pypinyin" `
            --hidden-import="jieba" `
            --hidden-import="transformers" `
            --hidden-import="transformers.models.bert" `
            --hidden-import="transformers.models.bert.modeling_bert" `
            --hidden-import="transformers.models.bert.tokenization_bert" `
            --hidden-import="torch" `
            --hidden-import="torch.nn" `
            --hidden-import="loguru" `
            --hidden-import="tqdm" `
            --collect-all="pycorrector" `
            docproof/__main__.py

      - name: Create portable package
        run: |
          Rename-Item "dist/DocProof" "DocProof-portable"
          @"
          DocProof 便携版使用说明
          ========================

          支持两种校对引擎:
            1. Kenlm 统计模型 — 开箱即用，需放入 .klm 文件到 models/
            2. MacBERT 深度学习 — 首次使用自动下载模型 (~400MB) 到 models/macbert_cache/

          Kenlm 模型下载:
            标准模型(141MB): https://github.com/shibing624/pycorrector/releases/download/1.0.0/people2014corpus_chars.klm
            大型模型(2.95GB): https://deepspeech.bj.bcebos.com/zh_lm/zh_giga.no_cna_cmn.prune01244.klm

          放入 models/ 目录后双击 DocProof.exe 启动。
          MacBERT 引擎需先安装 PyTorch（已内置），首次切换会自动下载模型。
          "@ | Out-File -FilePath "dist/DocProof-portable/使用说明.txt" -Encoding UTF8

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist/DocProof-portable/*" -DestinationPath "DocProof-windows-portable.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocProof-windows-portable
          path: DocProof-windows-portable.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DocProof-windows-portable.zip
          generate_release_notes: true
